<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سمو الأميرة - عالم المتعة والترفيه</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="bg-animated" id="bg-animated"></div>

    <!-- شاشة الترحيب -->
    <div id="screen-welcome" class="overlay">
        <div class="overlay-content">
            <div class="orb-container">
                <div class="glow-orb"></div>
            </div>
            <h1>مرحباً بك في عالم</h1>
            <h2 class="princess-text">سمو الأميرة</h2>
            <p>استعد لتجربة لعب جماعية فريدة ومثيرة</p>
            <button id="btn-welcome-start" class="btn-primary main-start-btn">ابدأ المغامرة الآن 🎮</button>
        </div>
    </div>

    <!-- شاشة المصادقة -->
    <div id="screen-auth" class="overlay hidden">
        <div class="auth-card glass">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="signup">إنشاء حساب</button>
                <button class="auth-tab" data-tab="login">تسجيل دخول</button>
            </div>

            <!-- إنشاء حساب -->
            <div id="auth-signup" class="auth-form">
                <div class="avatar-picker-container">
                    <div id="avatar-preview" class="avatar-circle glass">
                        <span class="plus-icon">+</span>
                        <img id="preview-img" src="" class="hidden">
                    </div>
                    <input type="file" id="avatar-input" accept="image/*" class="hidden">
                </div>
                <input type="text" id="signup-username" placeholder="اسم المستخدم" maxlength="15">
                <input type="password" id="signup-password" placeholder="كلمة المرور">
                <input type="password" id="signup-confirm" placeholder="تأكيد كلمة المرور">
                <button id="btn-do-signup" class="btn-primary">إنشاء حساب جديد ✨</button>
            </div>

            <!-- تسجيل دخول -->
            <div id="auth-login" class="auth-form hidden">
                <input type="text" id="login-identifier" placeholder="الاسم أو الـ ID">
                <input type="password" id="login-password" placeholder="كلمة المرور">
                <button id="btn-do-login" class="btn-primary">دخول 🚪</button>
            </div>
        </div>
    </div>

    <!-- واجهة التطبيق الرئيسية (SPA) -->
    <main id="app-main" class="hidden">
        <!-- شريط الترويسة العلوي -->
        <header class="app-header glass">
            <div class="header-left">
                <div class="search-icon">🔍</div>
                <div class="top-ranks">🏆</div>
                <div class="events-news">📢</div>
            </div>
            <div class="header-right">
                <div class="wallet-badge glass">
                    <span id="gold-balance">0</span>
                    <span class="gold-icon">💰</span>
                    <button class="btn-topup">+</button>
                </div>
                <div id="mini-profile-btn" class="mini-profile glass">
                    <img id="mini-avatar" src="" alt="me">
                </div>
            </div>
        </header>

        <!-- محتوى التبويبات -->
        <div id="tab-content">
            <!-- 1. الرئيسية (TopTop KSA) -->
            <section id="tab-home" class="tab-pane active">
                <div class="games-grid" id="games-grid">
                    <!-- Cards will be generated here -->
                </div>
                <button id="btn-create-fast-room" class="fab-btn glass">
                    <span>+</span>
                    إنشاء غرفة
                </button>
            </section>

            <!-- 2. استكشاف الغرف -->
            <section id="tab-rooms" class="tab-pane">
                <div class="room-tabs">
                    <button class="room-tab active" data-room-tab="discover">استكشف</button>
                    <button class="room-tab" data-room-tab="myrooms">غرفتي</button>
                </div>
                <div id="rooms-list" class="list-view"></div>
            </section>

            <!-- 3. المنشورات -->
            <section id="tab-social" class="tab-pane">
                <div class="social-tabs">
                    <button class="social-tab active">الأصدقاء</button>
                    <button class="social-tab">أعضاء الغرفة</button>
                </div>
                <div id="social-feed" class="list-view"></div>
            </section>

            <!-- 4. الرسائل -->
            <section id="tab-inbox" class="tab-pane">
                <div id="inbox-list" class="list-view"></div>
            </section>

            <!-- 5. الملف الشخصي -->
            <section id="tab-profile" class="tab-pane">
                <!-- Profile content injected via JS -->
            </section>
        </div>

        <!-- شريط الأصدقاء المتصلين (Bottom Tracker) -->
        <div id="friends-tracker" class="glass hidden">
            <div class="tracker-content">
                <!-- Active friends will appear here -->
            </div>
        </div>

        <!-- شريط التنقل السفلي -->
        <nav class="bottom-nav glass">
            <button class="nav-item active" data-tab="home">
                <div class="nav-icon">🏠</div>
                <span>الرئيسية</span>
            </button>
            <button class="nav-item" data-tab="rooms">
                <div class="nav-icon">🎙️</div>
                <span>غرفة</span>
            </button>
            <button class="nav-item" data-tab="social">
                <div class="nav-icon">✨</div>
                <span>المنشورات</span>
            </button>
            <button class="nav-item" data-tab="inbox">
                <div class="nav-icon">💬</div>
                <span>الرسائل</span>
            </button>
            <button class="nav-item" data-tab="profile">
                <div class="nav-icon">👤</div>
                <span>الخاص بي</span>
            </button>
        </nav>
    </main>

    <!-- طبقات الغرف والألعاب (Modals/Overlays) -->
    <div id="room-layer" class="layer hidden">
        <div class="room-container">
            <header class="room-header glass">
                <div class="room-info-top">
                    <button id="btn-close-room" class="btn-icon">✖</button>
                    <div class="room-details">
                        <div id="room-title">اسم الغرفة</div>
                        <div id="room-id-tag">ID: 000000</div>
                    </div>
                </div>
                <div class="room-actions-top">
                    <button id="btn-toggle-youtube" class="btn-icon">📺</button>
                    <button id="btn-room-settings" class="btn-icon">⚙️</button>
                </div>
            </header>

            <div class="room-body">
                <!-- YouTube Player (Optional) -->
                <div id="youtube-container" class="hidden">
                    <div id="player"></div>
                </div>

                <!-- Seats Layout -->
                <div class="seats-grid">
                    <!-- 8 Seats -->
                    <div class="seat-circle empty" data-seat="0"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="1"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="2"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="3"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="4"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="5"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="6"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="7"><div class="seat-plus">+</div></div>
                </div>

                <!-- Chat & Gifts Area -->
                <div class="room-chat-area">
                    <div id="room-messages" class="room-messages"></div>
                </div>
            </div>

            <footer class="room-footer glass">
                <button id="btn-room-mic" class="room-btn-circle mic-off">🎙️</button>
                <div class="room-input-wrap">
                    <input type="text" id="room-chat-input" placeholder="اكتب شيئاً...">
                </div>
                <button id="btn-room-gift" class="room-btn-circle">🎁</button>
                <button id="btn-room-emoji" class="room-btn-circle">😊</button>
            </footer>
        </div>
    </div>

    <div id="game-layer" class="layer hidden">
        <header class="game-layer-header glass">
            <button id="btn-close-game" class="btn-icon">✖</button>
            <div id="game-title-text">لعبة اونو</div>
        </header>
        <iframe id="game-frame" src="" frameborder="0" style="width:100%; height:calc(100% - 60px);"></iframe>
    </div>

    <div id="chat-layer" class="layer hidden">
        <header class="app-header glass">
            <button id="btn-close-chat" class="btn-icon">✖</button>
            <div id="chat-user-name" style="font-weight: 800;">اسم المستخدم</div>
            <div style="width: 24px;"></div>
        </header>
        <div id="chat-messages" class="chat-messages-container">
            <!-- Bubbles and Interactive Cards -->
        </div>
        <footer class="room-footer glass">
            <button class="room-btn-circle">📸</button>
            <div class="room-input-wrap">
                <input type="text" placeholder="اكتب رسالة...">
            </div>
            <button class="room-btn-circle">🎤</button>
            <button class="room-btn-circle">🎁</button>
        </footer>
    </div>

    <!-- التنبيهات -->
    <div id="main-toast" class="toast hidden"></div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
