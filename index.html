<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sumu Al-Princesa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .auth-tabs button {
            padding: 10px 20px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .auth-tabs button.active {
            background: #38ef7d;
            color: #000;
        }
        .auth-section {
            display: none;
        }
        .auth-section.active {
            display: block;
        }
        .error-message {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: none;
            text-align: center;
            font-size: 13px;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: rgba(56, 239, 125, 0.2);
            color: #38ef7d;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: none;
            text-align: center;
            font-size: 13px;
            white-space: pre-line;
        }
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body class="spa-shell">
    
    <!-- Auth / Splash Screen -->
    <div id="auth-screen" class="active-screen">
        <div class="auth-container">
            <h1 class="glow-text">سمو الأميرة</h1>
            <p>أهلاً بك في عالم الترفيه</p>
            
            <div class="card auth-card">
                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab-btn active" data-tab="login">دخول 🔓</button>
                    <button class="auth-tab-btn" data-tab="signup">إنشاء حساب 🔐</button>
                </div>

                <!-- رسائل الخطأ والنجاح -->
                <div class="error-message" id="error-message"></div>
                <div class="success-message" id="success-message"></div>

                <!-- تسجيل الدخول -->
                <div class="auth-section active" id="login-section">
                    <h3 style="color: white; text-align: center; margin-bottom: 15px;">تسجيل الدخول</h3>
                    <input type="text" id="login-email" placeholder="اسم المستخدم أو الـ ID">
                    <input type="password" id="login-password" placeholder="كلمة المرور">
                    <button id="btn-login" class="btn-primary" style="width: 100%; margin-top: 15px;">دخول</button>
                </div>

                <!-- إنشاء حساب جديد -->
                <div class="auth-section" id="signup-section">
                    <h3 style="color: white; text-align: center; margin-bottom: 15px;">إنشاء حساب جديد</h3>
                    <input type="text" id="signup-name" placeholder="اسم المستخدم" maxlength="15">
                    <input type="password" id="signup-password" placeholder="كلمة المرور (6+ أحرف)">
                    <input type="password" id="signup-password-confirm" placeholder="تأكيد كلمة المرور">
                    <div class="gender-selection" style="margin: 15px 0;">
                        <button type="button" class="btn-gender" data-gender="male">👨 ذكر</button>
                        <button type="button" class="btn-gender" data-gender="female">👩 أنثى</button>
                    </div>
                    <button id="btn-signup" class="btn-primary" style="width: 100%; margin-top: 15px;">إنشاء حساب</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main SPA Container (Hidden until logged in) -->
    <div id="main-spa" class="hidden">

        <!-- Tab Content Sections -->
        <main class="spa-content">
            <!-- 1. Home (Games) -->
            <section id="tab-home" class="spa-tab active">
                <header class="spa-header">
                    <div class="header-user-info">
                        <img id="header-avatar" src="" alt="Avatar" class="avatar-small">
                        <div class="gold-balance">
                            <span class="gold-icon">💰</span>
                            <span id="header-gold">0</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="btn-icon">🔍</button>
                    </div>
                </header>

                <div class="online-friends-bar">
                    <!-- Online friends bubbles go here -->
                </div>

                <div class="games-grid">
                    <div class="game-card" data-game="ono.html">
                        <div class="game-icon" style="background: linear-gradient(135deg, #ff4b2b, #ff416c);">UNO</div>
                        <h3>أونو</h3>
                    </div>
                    <div class="game-card" data-game="chess.html">
                        <div class="game-icon" style="background: linear-gradient(135deg, #4b6cb7, #182848);">♟️</div>
                        <h3>شطرنج</h3>
                    </div>
                    <div class="game-card" data-game="legacy_game.html">
                        <div class="game-icon" style="background: linear-gradient(135deg, #11998e, #38ef7d);">📝</div>
                        <h3>حيوان نبات</h3>
                    </div>
                </div>
            </section>

            <!-- 2. Rooms -->
            <section id="tab-rooms" class="spa-tab hidden">
                <header class="spa-header rooms-header">
                    <button class="sub-tab active" data-sub="explore">استكشف</button>
                    <button class="sub-tab" data-sub="my-room">غرفتي</button>
                    <button class="sub-tab" data-sub="riyadh">الرياض</button>
                </header>
                <div id="rooms-explore" class="sub-tab-content active">
                    <!-- Room list goes here -->
                    <div class="rooms-list" id="active-rooms-list"></div>
                </div>
                <div id="rooms-my-room" class="sub-tab-content hidden">
                    <button id="btn-create-my-room" class="btn-primary">إنشاء غرفتي الخاصة</button>
                </div>
            </section>

            <!-- 3. Posts (Social) -->
            <section id="tab-posts" class="spa-tab hidden">
                <header class="spa-header">
                    <h2>المنشورات</h2>
                </header>
                <div class="post-card">
                    <div class="search-bar" style="margin-bottom:0; display:flex; gap:10px;">
                        <input type="text" id="new-post-input" placeholder="بم تفكر؟" style="flex:1;">
                        <button id="btn-submit-post" class="btn-primary" style="padding: 12px 20px;">نشر</button>
                    </div>
                </div>
                <div class="posts-feed" id="posts-feed">
                    <!-- Posts go here -->
                </div>
            </section>

            <!-- 4. Messages -->
            <section id="tab-messages" class="spa-tab hidden">
                <header class="spa-header">
                    <h2>الرسائل</h2>
                    <button class="btn-icon">➕</button>
                </header>
                <div class="search-bar">
                    <input type="text" placeholder="ابحث عن أصدقاء (ID أو اسم)">
                </div>
                <div class="post-card" style="margin-bottom:10px;">
                    <div class="search-bar" style="margin-bottom:0; display:flex; gap:10px;">
                        <input type="text" id="new-msg-input" placeholder="اكتب رسالة..." style="flex:1;">
                        <button id="btn-submit-msg" class="btn-primary" style="padding: 12px 20px;">إرسال</button>
                    </div>
                </div>
                <div class="messages-list" id="messages-list">
                    <!-- Chats go here -->
                </div>
            </section>

            <!-- 5. Profile -->
            <section id="tab-profile" class="spa-tab hidden">
                <div class="profile-dashboard">
                    <div class="profile-header-main">
                        <img id="profile-avatar-large" src="" alt="Avatar" class="avatar-large">
                        <h2 id="profile-name-large">الاسم</h2>
                        <p class="profile-id">ID: <span id="profile-id-large">100000000</span></p>
                    </div>
                    <div class="profile-settings">
                        <button class="setting-item">من زار حسابي <span>👁️</span></button>
                        <button class="setting-item">المحفظة <span>💰</span></button>
                        <button class="setting-item">VIP <span>👑</span></button>
                        <button class="setting-item" id="btn-logout">تسجيل الخروج <span>🚪</span></button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation Bar -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="tab-home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">الرئيسية</span>
            </button>
            <button class="nav-item" data-target="tab-rooms">
                <span class="nav-icon">🎙️</span>
                <span class="nav-label">الغرف</span>
            </button>
            <button class="nav-item" data-target="tab-posts">
                <span class="nav-icon">🌟</span>
                <span class="nav-label">المنشورات</span>
            </button>
            <button class="nav-item" data-target="tab-messages">
                <span class="nav-icon">💬</span>
                <span class="nav-label">الرسائل</span>
            </button>
            <button class="nav-item" data-target="tab-profile">
                <span class="nav-icon">👤</span>
                <span class="nav-label">الخاص بي</span>
            </button>
        </nav>

    </div>

    <!-- Iframe Modal Layer -->
    <div id="iframe-modal" class="iframe-modal hidden">
        <button id="btn-close-iframe" class="btn-close-modal">✖</button>
        <iframe id="game-iframe" src="" frameborder="0" allow="autoplay; camera; microphone"></iframe>
    </div>

    <!-- Public Profile Modal -->
    <div id="public-profile-modal" class="modal hidden">
        <div class="modal-content profile-modal-content">
            <button class="btn-close" id="btn-close-profile">✖</button>
            <img id="pub-avatar" src="" class="avatar-huge">
            <h2 id="pub-name"></h2>
            <p>ID: <span id="pub-id"></span></p>
            <p id="pub-bio" class="bio">لا توجد نبذة</p>
            <div class="level-badge">LVL <span id="pub-level">1</span></div>
        </div>
    </div>

    <script type="module" src="js/spa.js"></script>

<!-- Legacy Room Modal (Floating) -->
<div id="legacy-room-modal" class="iframe-modal hidden" style="width: 350px; height: 500px; bottom: 80px; top: auto; right: 20px; left: auto; border-radius: 16px; box-shadow: var(--glass-shadow);">
    <div style="background: var(--bg-dark); padding: 10px; display: flex; justify-content: space-between; border-top-left-radius: 16px; border-top-right-radius: 16px;">
        <span style="color: white; font-weight: bold;">غرفة صوتية</span>
        <div>
            <button id="btn-minimize-room" style="background:none; border:none; color:white; cursor:pointer; margin-left:10px;">➖</button>
            <button id="btn-close-room" style="background:none; border:none; color:white; cursor:pointer;">✖</button>
        </div>
    </div>
    <iframe id="room-iframe" src="" frameborder="0" allow="autoplay; camera; microphone" style="border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; height: calc(100% - 40px);"></iframe>
</div>

<!-- Minimized Room Bubble -->
<div id="minimized-room-bubble" class="hidden" style="position: fixed; bottom: 80px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary-gradient); z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 28px; box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);">
    🎙️
</div>

</body>
</html>
