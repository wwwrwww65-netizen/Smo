<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة اسم حيوان نبات جماد بلاد</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- زر الانسحاب العالمي -->
        <button id="btn-quit" class="btn-quit hidden">خروج 🚪</button>

        <!-- التنبيهات -->
        <div id="main-toast" class="toast hidden"></div>

        <!-- قسم الصفحة الرئيسية -->
        <section id="section-home" class="active">
            <h1>لعبة اسم حيوان نبات</h1>
            <div class="card">
                <input type="text" id="player-name" placeholder="أدخل اسمك هنا..." aria-label="اسم اللاعب" maxlength="15">
                <button id="btn-create-room" class="btn-primary">إنشاء غرفة ✨</button>
                <div class="separator">أو</div>
                <input type="text" id="room-id-input" placeholder="أدخل رمز الغرفة..." aria-label="رمز الغرفة" maxlength="9">
                <button id="btn-join-room" class="btn-secondary">انضمام 🤝</button>
            </div>
        </section>

        <!-- قسم الانتظار (اللوبي) -->
        <section id="section-lobby">
            <h2>غرفة الانتظار</h2>
            <div class="card">
                <div class="room-info">
                    <div class="room-id-container">
                        <span>رمز الغرفة:</span>
                        <strong id="display-room-id">...</strong>
                        <button id="btn-copy-id" class="btn-icon" title="نسخ الرمز">📋</button>
                    </div>
                </div>
                <h3>اللاعبون المنضمون:</h3>
                <ul id="player-list">
                    <!-- قائمة اللاعبين تظهر هنا -->
                </ul>
                <div class="lobby-actions">
                    <button id="btn-ready" class="btn-success">أنا مستعد 👍</button>
                </div>
            </div>
        </section>

        <!-- قسم اللعبة -->
        <section id="section-game">
            <div class="game-header">
                <div id="random-letter-display">؟</div>
                <div id="timer-display"></div>
            </div>
            <div class="card game-inputs">
                <div class="input-group">
                    <label>اسم</label>
                    <input type="text" id="input-name" class="game-field" autocomplete="off" placeholder="اسم...">
                </div>
                <div class="input-group">
                    <label>حيوان</label>
                    <input type="text" id="input-animal" class="game-field" autocomplete="off" placeholder="حيوان...">
                </div>
                <div class="input-group">
                    <label>نبات</label>
                    <input type="text" id="input-plant" class="game-field" autocomplete="off" placeholder="نبات...">
                </div>
                <div class="input-group">
                    <label>جماد</label>
                    <input type="text" id="input-object" class="game-field" autocomplete="off" placeholder="جماد...">
                </div>
                <div class="input-group">
                    <label>بلاد</label>
                    <input type="text" id="input-country" class="game-field" autocomplete="off" placeholder="بلاد...">
                </div>
            </div>
            <button id="btn-stop" class="btn-stop">انتهيت! 🔔</button>
        </section>

        <!-- قسم النتائج -->
        <section id="section-score">
            <h2>نتائج الجولة</h2>
            <div class="card">
                <div class="table-container">
                    <table id="score-table">
                        <thead>
                            <tr>
                                <th>اللاعب</th>
                                <th>اسم</th>
                                <th>حيوان</th>
                                <th>نبات</th>
                                <th>جماد</th>
                                <th>بلاد</th>
                                <th>المجموع</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- النتائج تظهر هنا -->
                        </tbody>
                    </table>
                </div>
                <div id="host-controls" class="hidden">
                    <p class="host-hint">أنت المضيف: قم بتقييم الإجابات ثم اضغط الجولة التالية</p>
                    <button id="btn-next-round" class="btn-primary">الجولة التالية 🔄</button>
                </div>
            </div>
        </section>
    </div>

    <!-- تحميل Agora RTM SDK الإصدار الجديد 2.3.1 (الرابط يعمل) -->
    <script src="https://cdn.agora.io/sdk/release/agora-rtm.sdk-2.3.1.min.js"></script>
    
    <!-- طبقة توافق تحاكي الإصدار القديم 1.4.4 -->
    <script>
        (function() {
            // انتظر حتى يتم تحميل SDK الجديد (الذي يعرّف RTM)
            let checkInterval = setInterval(function() {
                if (typeof RTM !== 'undefined') {
                    clearInterval(checkInterval);
                    
                    // إنشاء كائن AgoraRTM بنفس واجهة الإصدار 1.4.4
                    window.AgoraRTM = {
                        VERSION: '1.4.4-compat',
                        
                        createInstance: function(appId, config) {
                            console.log('[Compat] Creating RTM client with appId:', appId);
                            const client = RTM.createInstance(appId, config || {});
                            
                            // إضافة دوال missing في الإصدار القديم
                            if (!client.login) {
                                client.login = function(token, uid) {
                                    // الإصدار القديم: login(token, uid) -> الإصدار الجديد: login({token, uid})
                                    return client.login({ token: token, uid: uid });
                                };
                            }
                            
                            if (!client.logout) {
                                client.logout = function() {
                                    return client.logout();
                                };
                            }
                            
                            if (!client.createChannel) {
                                client.createChannel = function(channelName) {
                                    const channel = client.createChannel(channelName);
                                    // إصلاح إرسال الرسائل: الإصدار القديم يستخدم channel.sendMessage(messageObject)
                                    // الإصدار الجديد يستخدم channel.sendMessage({text: string})
                                    if (!channel.sendMessage) {
                                        channel.sendMessage = function(message) {
                                            // إذا كان message له خاصية text نستخدمها مباشرة، وإلا نحول
                                            let text = message.text || (typeof message === 'string' ? message : JSON.stringify(message));
                                            return channel.sendMessage({ text: text });
                                        };
                                    }
                                    // إصلاح حدث استقبال الرسائل: الإصدار القديم يستخدم channel.on('ChannelMessage', callback)
                                    // الإصدار الجديد يستخدم channel.on('message', callback)
                                    if (!channel.on) {
                                        channel.on = function(eventName, callback) {
                                            if (eventName === 'ChannelMessage') {
                                                channel.on('message', function(message, peerId) {
                                                    // تحويل الشكل إلى القديم: {text: ...}
                                                    callback(message, peerId);
                                                });
                                            } else {
                                                channel.on(eventName, callback);
                                            }
                                        };
                                    }
                                    return channel;
                                };
                            }
                            
                            // إصلاح client.on للإصدار القديم (مثل 'ConnectionStateChanged')
                            if (!client.on) {
                                client.on = function(eventName, callback) {
                                    client.on(eventName, callback);
                                };
                            }
                            
                            return client;
                        }
                    };
                    
                    console.log('✅ Compatibility layer active: AgoraRTM ready (simulating v1.4.4)');
                }
            }, 50);
            
            // مهلة أمان: إذا لم يتحمل خلال 5 ثوانٍ
            setTimeout(function() {
                if (typeof window.AgoraRTM === 'undefined') {
                    console.error('❌ Failed to load Agora RTM SDK from CDN');
                    document.body.innerHTML = '<div style="text-align:center;padding:50px;color:white;"><h2>❌ فشل تحميل المكتبة</h2><p>يرجى تحديث الصفحة أو التحقق من الاتصال</p></div>';
                }
            }, 5000);
        })();
    </script>
    
    <!-- منطق اللعبة (app.js) سيبقى كما هو ويعمل بفضل طبقة التوافق -->
    <script src="js/app.js"></script>
</body>
</html>
