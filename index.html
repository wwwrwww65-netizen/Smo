<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سمو الأميرة - عالم المتعة والترفيه</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0f172a">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="bg-animated" id="bg-animated"></div>

    <!-- شاشة الترحيب -->
    <div id="screen-welcome" class="overlay">
        <div class="overlay-content">
            <div class="orb-container">
                <div class="glow-orb"></div>
            </div>
            <h1>مرحباً بك في عالم</h1>
            <h2 class="princess-text">سمو الأميرة</h2>
            <p>استعد لتجربة لعب جماعية فريدة ومثيرة</p>
            <button id="btn-welcome-start" class="btn-primary main-start-btn">ابدأ المغامرة الآن 🎮</button>
        </div>
    </div>

    <!-- شاشة المصادقة -->
    <div id="screen-auth" class="overlay hidden">
        <div class="auth-card glass">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="signup">إنشاء حساب</button>
                <button class="auth-tab" data-tab="login">تسجيل دخول</button>
            </div>

            <!-- إنشاء حساب -->
            <div id="auth-signup" class="auth-form">
                <div class="gender-selection">
                    <button type="button" class="gender-btn glass" data-gender="male">
                        <div class="gender-icon">👨</div>
                        <span>ذكر</span>
                    </button>
                    <button type="button" class="gender-btn glass" data-gender="female">
                        <div class="gender-icon">👩</div>
                        <span>أنثى</span>
                    </button>
                </div>
                <input type="text" id="signup-username" placeholder="اسم المستخدم" maxlength="15">
                <input type="password" id="signup-password" placeholder="كلمة المرور">
                <input type="password" id="signup-confirm" placeholder="تأكيد كلمة المرور">
                <button id="btn-do-signup" class="btn-primary">إنشاء حساب جديد ✨</button>
            </div>

            <!-- تسجيل دخول -->
            <div id="auth-login" class="auth-form hidden">
                <input type="text" id="login-identifier" placeholder="الاسم أو الـ ID">
                <input type="password" id="login-password" placeholder="كلمة المرور">
                <button id="btn-do-login" class="btn-primary">دخول 🚪</button>
            </div>
        </div>
    </div>

    <!-- واجهة التطبيق الرئيسية (SPA) -->
    <main id="app-main" class="hidden">
        <!-- شريط الترويسة العلوي -->
        <header class="app-header glass">
            <div class="header-left">
                <div class="search-icon">🔍</div>
                <div class="top-ranks">🏆</div>
                <div class="events-news">📢</div>
            </div>
            <div class="header-right">
                <div class="wallet-badge glass">
                    <span id="gold-balance">0</span>
                    <span class="gold-icon">💰</span>
                    <button class="btn-topup">+</button>
                </div>
                <div id="mini-profile-btn" class="mini-profile glass">
                    <img id="mini-avatar" src="" alt="me">
                </div>
            </div>
        </header>

        <!-- محتوى التبويبات -->
        <div id="tab-content">
            <!-- 1. الرئيسية (TopTop KSA) -->
            <section id="tab-home" class="tab-pane active">
                <div class="games-grid" id="games-grid">
                    <!-- Cards will be generated here -->
                </div>
                <button id="btn-create-fast-room" class="fab-btn glass">
                    <span>+</span>
                    إنشاء غرفة
                </button>
            </section>

            <!-- 2. استكشاف الغرف -->
            <section id="tab-rooms" class="tab-pane">
                <div class="room-tabs">
                    <button class="room-tab active" data-room-tab="discover">استكشف</button>
                    <button class="room-tab" data-room-tab="myrooms">غرفتي</button>
                </div>
                <div id="rooms-list" class="list-view"></div>
            </section>

            <!-- 3. المنشورات -->
            <section id="tab-social" class="tab-pane">
                <div class="social-tabs">
                    <button class="social-tab active">الأصدقاء</button>
                    <button class="social-tab">أعضاء الغرفة</button>
                </div>
                <div id="social-feed" class="list-view"></div>
            </section>

            <!-- 4. الرسائل -->
            <section id="tab-inbox" class="tab-pane">
                <div id="inbox-list" class="list-view"></div>
            </section>

            <!-- 5. الملف الشخصي -->
            <section id="tab-profile" class="tab-pane">
                <!-- Profile content injected via JS -->
            </section>
        </div>

        <!-- شريط الأصدقاء المتصلين (Bottom Tracker) -->
        <div id="friends-tracker" class="glass hidden">
            <div class="tracker-content">
                <!-- Active friends will appear here -->
            </div>
        </div>

        <!-- شريط التنقل السفلي -->
        <nav class="bottom-nav glass">
            <button class="nav-item active" data-tab="home">
                <div class="nav-icon">🏠</div>
                <span>الرئيسية</span>
            </button>
            <button class="nav-item" data-tab="rooms">
                <div class="nav-icon">🎙️</div>
                <span>غرفة</span>
            </button>
            <button class="nav-item" data-tab="social">
                <div class="nav-icon">✨</div>
                <span>المنشورات</span>
            </button>
            <button class="nav-item" data-tab="inbox">
                <div class="nav-icon">💬</div>
                <span>الرسائل</span>
            </button>
            <button class="nav-item" data-tab="profile">
                <div class="nav-icon">👤</div>
                <span>الخاص بي</span>
            </button>
        </nav>
    </main>

    <!-- طبقات الغرف والألعاب (Modals/Overlays) -->
    <div id="room-layer" class="layer hidden">
        <div class="room-container">
            <!-- Theatrical Background -->
            <div class="theatrical-bg">
                <div class="curtain left"></div>
                <div class="curtain right"></div>
                <div class="stage-light"></div>
            </div>

            <header class="room-header glass">
                <div class="room-info-top">
                    <button id="btn-close-room" class="btn-icon">✖</button>
                    <div class="room-details">
                        <div id="room-title">اسم الغرفة</div>
                        <div id="room-id-tag">ID: 000000</div>
                    </div>
                </div>
                <div class="room-actions-top">
                    <button id="btn-toggle-youtube" class="btn-icon">📺</button>
                    <button id="btn-room-settings" class="btn-icon">⚙️</button>
                </div>
            </header>

            <div class="room-body">
                <!-- Media Section (Ported from live/index.html) -->
                <div class="video-container" id="main-video-container">
                    <!-- الجزء العلوي: العنوان -->
                    <div class="vid-header-top">
                        <div class="video-ornament">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="#FFD700"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                        </div>
                        <h2 id="vid-title" class="vid-title-main">بث مباشر</h2>
                        <p id="vid-owner" class="vid-owner-name">بواسطة: ...</p>
                    </div>

                    <!-- الجزء الأوسط: المشغل أو حالة الإيقاف -->
                    <div class="vid-content-middle">
                        <!-- مشغل يوتيوب -->
                        <div id="youtube-player-container" class="hidden" style="width:100%; height:100%;">
                            <div id="player"></div>
                        </div>

                        <!-- مشغل فيديو عام -->
                        <div id="generic-video-container" class="hidden" style="width:100%; height:100%;">
                            <video id="generic-video" controls playsinline webkit-playsinline style="width:100%; height:100%; background:#000;"></video>
                        </div>

                        <!-- متصفح داخلي -->
                        <div id="browser-container" class="hidden" style="position: absolute; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; z-index: 10;">
                            <div id="browser-toolbar" class="hidden" style="background: #1a1a1a; padding: 8px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #333; z-index: 30;">
                                <input type="text" id="browser-url-input" placeholder="أدخل الرابط أو ابحث..." style="flex: 1; padding: 6px 12px; border-radius: 20px; border: 1px solid #444; background: #2a2a2a; color: #fff; font-size: 12px;">
                                <button id="btn-browser-go" class="btn-primary" style="padding: 4px 10px; font-size: 10px;">انتقال</button>
                            </div>
                            <iframe id="browser-iframe" src="" allow="autoplay; encrypted-media; fullscreen" style="flex: 1; width:100%; border:none; background:#fff;"></iframe>
                        </div>

                        <div id="vid-placeholder" class="vid-placeholder-box">
                            <div class="vid-icon-big">📺</div>
                            <p id="vid-stopped-message">المالك قام بإيقاف الفيديو</p>
                        </div>
                    </div>

                    <!-- الجزء السفلي: العلامة والأيقونات -->
                    <div class="vid-footer-row">
                        <div class="footer-actions-right">
                            <button class="btn-icon" id="btn-open-media-control">⚙️</button>
                            <button class="btn-icon" id="btn-playlist">📋</button>
                        </div>
                        <div class="yt-brand" id="media-brand" style="color: #fff; font-weight: bold; font-size: 12px;">YouTube</div>
                    </div>
                </div>

                <!-- Seats Layout -->
                <div class="seats-grid">
                    <!-- 8 Seats -->
                    <div class="seat-circle empty" data-seat="0"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="1"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="2"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="3"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="4"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="5"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="6"><div class="seat-plus">+</div></div>
                    <div class="seat-circle empty" data-seat="7"><div class="seat-plus">+</div></div>
                </div>

                <!-- Chat & Gifts Area -->
                <div class="room-chat-area">
                    <div id="room-messages" class="room-messages"></div>
                </div>
            </div>

            <footer class="room-footer glass">
                <button id="btn-room-mic" class="room-btn-circle mic-off">🎙️</button>
                <div class="room-input-wrap">
                    <input type="text" id="room-chat-input" placeholder="اكتب شيئاً...">
                </div>
                <button id="btn-room-gift" class="room-btn-circle">🎁</button>
                <button id="btn-room-emoji" class="room-btn-circle">😊</button>
            </footer>
        </div>
    </div>

    <div id="game-layer" class="layer hidden">
        <header class="game-layer-header glass">
            <button id="btn-close-game" class="btn-icon">✖</button>
            <div id="game-title-text">لعبة اونو</div>
        </header>
        <iframe id="game-frame" src="" frameborder="0" style="width:100%; height:calc(100% - 60px);"></iframe>
    </div>

    <!-- Modal للتحكم في الميديا -->
    <div id="modal-media-control" class="overlay hidden" style="z-index: 4000;">
        <div class="auth-card glass">
            <div class="modal-header" style="text-align: center; font-weight: 800; margin-bottom: 15px;">إدارة المحتوى 📺</div>
            <input type="text" id="media-url-input" placeholder="رابط (YouTube, MP4, أو موقع)...">

            <div class="media-type-selector" style="display: flex; gap: 5px; justify-content: center; margin: 10px 0;">
                <button id="type-auto" class="auth-tab active" style="font-size: 0.7rem;">تلقائي</button>
                <button id="type-yt" class="auth-tab" style="font-size: 0.7rem;">YouTube</button>
                <button id="type-web" class="auth-tab" style="font-size: 0.7rem;">متصفح</button>
            </div>

            <div style="display: flex; gap: 10px;">
                <button id="btn-load-media" class="btn-primary" style="flex: 1;">تحميل ✅</button>
                <button id="btn-close-media-modal" class="btn-primary" style="flex: 1; background: #ef4444;">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- Modal قائمة التشغيل -->
    <div id="modal-playlist" class="overlay hidden" style="z-index: 4000;">
        <div class="auth-card glass">
            <div class="modal-header" style="text-align: center; font-weight: 800; margin-bottom: 15px;">قائمة التشغيل 📋</div>
            <div id="playlist-container" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;">
                <!-- Items will be here -->
                <p style="text-align: center; color: var(--text-dim); font-size: 0.8rem;">القائمة فارغة</p>
            </div>
            <button id="btn-close-playlist-modal" class="btn-primary" style="width: 100%; background: #ef4444;">إغلاق</button>
        </div>
    </div>

    <div id="chat-layer" class="layer hidden">
        <header class="app-header glass">
            <button id="btn-close-chat" class="btn-icon">✖</button>
            <div id="chat-user-name" style="font-weight: 800;">اسم المستخدم</div>
            <div style="width: 24px;"></div>
        </header>
        <div id="chat-messages" class="chat-messages-container">
            <!-- Bubbles and Interactive Cards -->
        </div>
        <footer class="room-footer glass">
            <button class="room-btn-circle">📸</button>
            <div class="room-input-wrap">
                <input type="text" placeholder="اكتب رسالة...">
            </div>
            <button class="room-btn-circle">🎤</button>
            <button class="room-btn-circle">🎁</button>
        </footer>
    </div>

    <!-- التنبيهات -->
    <div id="main-toast" class="toast hidden"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
