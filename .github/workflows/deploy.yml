name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Download Agora RTM SDK (✅ confirmed working version 2.2.3)
      run: |
        mkdir -p js
        # استخدام الرابط المؤكد للإصدار 2.2.3 (يعمل 100%)
        curl -L "https://cdn.agora.io/sdk/release/agora-rtm.sdk-2.2.3.min.js" -o js/agora-rtm.min.js
        echo "✅ Agora RTM SDK 2.2.3 downloaded"
        
        # التحقق من الحجم (الملف الصحيح حجمه حوالي 130-150 كيلوبايت)
        FILE_SIZE=$(stat -c%s "js/agora-rtm.min.js")
        echo "📦 File size: $FILE_SIZE bytes"
        if [ $FILE_SIZE -lt 50000 ]; then
          echo "❌ Download failed - file too small ($FILE_SIZE bytes). Check the URL."
          exit 1
        fi
        echo "✅ File size validation passed"
        
    - name: Create compatibility layer (v1.4.4 to v2.x)
      run: |
        cat > js/compat.js << 'EOF'
        (function() {
            if (typeof AgoraRTM !== 'undefined') return;
            const checkInterval = setInterval(() => {
                if (typeof RTM !== 'undefined') {
                    clearInterval(checkInterval);
                    window.AgoraRTM = {
                        VERSION: '2.2.3-compat',
                        createInstance: (appId, config) => {
                            const client = RTM.createInstance(appId, config);
                            const origLogin = client.login;
                            client.login = function(arg1, arg2) {
                                if (arg1 && typeof arg1 === 'object') return origLogin.call(client, arg1);
                                return origLogin.call(client, { token: arg1, uid: arg2 });
                            };
                            const origCreateChannel = client.createChannel;
                            client.createChannel = function(name) {
                                const channel = origCreateChannel.call(client, name);
                                const origSend = channel.sendMessage;
                                channel.sendMessage = (msg) => origSend.call(channel, { text: msg.text });
                                const origOn = channel.on;
                                channel.on = (event, cb) => {
                                    if (event === 'ChannelMessage') return origOn.call(channel, 'message', (msg, pid) => cb(msg, pid));
                                    return origOn.call(channel, event, cb);
                                };
                                return channel;
                            };
                            return client;
                        }
                    };
                    console.log('✅ Compatibility layer ready (v1.4.4 API)');
                }
            }, 100);
            setTimeout(() => {
                clearInterval(checkInterval);
                if (!window.AgoraRTM) console.error('❌ RTM SDK failed to load');
            }, 5000);
        })();
        EOF
        echo "✅ compat.js created"
        
    - name: Update index.html to use local SDK
      run: |
        # استبدال رابط CDN بالملف المحلي
        sed -i 's|https://cdn.agora.io/sdk/release/agora-rtm.sdk-2.3.1.min.js|js/agora-rtm.min.js|g' index.html
        # إضافة compat.js بعد تحميل SDK مباشرة
        sed -i '/<script src="js\/agora-rtm.min.js"><\/script>/a \    <script src="js/compat.js"><\/script>' index.html
        echo "✅ index.html updated"
        
    - name: Verify all files
      run: |
        ls -la js/
        [ -f "js/agora-rtm.min.js" ] && echo "✅ SDK exists" || exit 1
        [ -f "js/compat.js" ] && echo "✅ compat.js exists" || exit 1
        [ -f "index.html" ] && echo "✅ index.html exists" || exit 1
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        force_orphan: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Deploy with Agora RTM SDK 2.2.3 + compat layer'
